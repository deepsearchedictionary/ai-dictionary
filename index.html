<!DOCTYPE html>
<html>
<head>
<title>AI Dictionary</title>

<style>

body{
font-family: Arial;
background:#f7f7f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:500px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ddd;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
background:black;
color:white;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Dictionary</h2>

<input id="word" placeholder="Type a word">

<button onclick="searchWord()">Search</button>

<div id="result"></div>

</div>

<script>

async function searchWord(){

let word=document.getElementById("word").value

let res=await fetch(
"https://api.dictionaryapi.dev/api/v2/entries/en/"+word
)

let data=await res.json()

let meaning=data[0].meanings[0].definitions[0].definition

document.getElementById("result").innerHTML =
"<b>Meaning:</b> "+meaning

}

</script>

</body>
</html>
