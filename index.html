<!DOCTYPE html>
<html>
<head>
<title>AI Dictionary</title>

<style>

body{
font-family: Arial;
background:#f7f7f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:500px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ddd;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
background:black;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#333;
}

#result{
margin-top:20px;
font-size:16px;
}

#dailyWord{
margin-bottom:20px;
color:#444;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Dictionary</h2>

<h3>Word of the Day</h3>
<div id="dailyWord">Loading...</div>

<input id="word" placeholder="Type a word">

<button onclick="speakWord()">🔊 Pronounce</button>

<button onclick="searchWord()">Search</button>

<div id="result"></div>

</div>

<script>

async function searchWord(){

let word=document.getElementById("word").value

if(word===""){
document.getElementById("result").innerHTML="Please enter a word"
return
}

let res=await fetch(
"https://api.dictionaryapi.dev/api/v2/entries/en/"+word
)

let data=await res.json()

let meaning=data[0].meanings[0].definitions[0].definition

document.getElementById("result").innerHTML=
"<b>Meaning:</b> "+meaning

}

function speakWord(){

let word=document.getElementById("word").value

if(word===""){
alert("Type a word first")
return
}

let speech=new SpeechSynthesisUtterance(word)

speech.lang="en-US"

window.speechSynthesis.speak(speech)

}

async function wordOfDay(){

let words=[
"serendipity",
"ephemeral",
"eloquent",
"resilient",
"lucid",
"meticulous",
"ambiguous",
"tenacious",
"vivid",
"tranquil"
]

let randomWord=words[Math.floor(Math.random()*words.length)]

let res=await fetch(
"https://api.dictionaryapi.dev/api/v2/entries/en/"+randomWord
)

let data=await res.json()

let meaning=data[0].meanings[0].definitions[0].definition

document.getElementById("dailyWord").innerHTML=
"<b>"+randomWord+"</b><br>"+meaning

}

wordOfDay()

</script>

</body>
</html>
